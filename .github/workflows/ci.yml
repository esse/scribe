name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Security scan (Brakeman)
        run: bin/brakeman --no-pager -i config/brakeman.ignore
      - name: Lint (RuboCop)
        run: bin/rubocop --parallel
      - name: Audit JS dependencies (importmap)
        run: bin/importmap audit || true

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready" --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg + WeasyPrint (PDF export)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg weasyprint
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:test:prepare
      - name: Run tests
        run: bin/rails test
