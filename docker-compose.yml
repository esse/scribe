# Local-first: one container, one mounted folder. No Postgres, no MinIO — the
# SQLite database, your recordings, and the generated manuals all live under
# ./data on your machine.
#
#   echo "SECRET_KEY_BASE=$(openssl rand -hex 32)" > .env   # once
#   echo "ANTHROPIC_API_KEY=sk-ant-..." >> .env             # your own key
#   docker compose up --build                                # http://localhost:3000
#
# Prefer a fully local model? Drop the Anthropic key and set instead:
#   LLM_PROVIDER=local
#   LLM_BASE_URL=http://host.docker.internal:11434/v1   # e.g. Ollama on the host
#   LLM_MODEL=llama3.2-vision
services:
  scribe:
    build: .
    ports:
      - "3000:80"
    volumes:
      - ./data:/data
    environment:
      # Required so signed URLs survive restarts. Generate once with
      # `openssl rand -hex 32` and keep it in .env.
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      # Your own keys / model selection (see .env.example).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      TRANSCRIPTION_PROVIDER: ${TRANSCRIPTION_PROVIDER:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    # Reach a model server (Ollama, llama.cpp) running on the host as
    # host.docker.internal on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
