name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Security scan (Brakeman)
        run: bin/brakeman --no-pager -i config/brakeman.ignore
      - name: Lint (RuboCop)
        run: bin/rubocop --parallel
      - name: Audit JS dependencies (importmap)
        run: bin/importmap audit || true

  test:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg + WeasyPrint (PDF export)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg weasyprint
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
      - name: Prepare database
        run: bin/rails db:test:prepare
      - name: Run tests
        run: bin/rails test
