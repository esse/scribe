# SQLite, local-first. The whole datastore is a set of files under the data dir
# (SCRIBE_DATA_DIR, default ./data), so mounting that one folder into a container
# carries all state — no external database service required.
#
# Rails 8 keeps the job queue, cache, and cable in their own SQLite files. They
# all live alongside the primary database in the data dir.
<% data_dir = ENV.fetch("SCRIBE_DATA_DIR", Rails.root.join("data").to_s) %>
<% db_dir = File.join(data_dir, "db") %>

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

# Development and test only use the primary DB and the job queue (cache is in
# memory, cable is async), so they configure just those two.
development:
  primary:
    <<: *default
    database: <%= File.join(db_dir, "scribe.sqlite3") %>
  queue:
    <<: *default
    database: <%= File.join(db_dir, "scribe_queue.sqlite3") %>
    migrations_paths: db/queue_migrate

# The test database is kept in tmp (never the data dir) so the suite is
# disposable and never touches real recordings.
test:
  primary:
    <<: *default
    database: tmp/test/scribe_test.sqlite3
  queue:
    <<: *default
    database: tmp/test/scribe_test_queue.sqlite3
    migrations_paths: db/queue_migrate

production:
  primary:
    <<: *default
    database: <%= File.join(db_dir, "scribe.sqlite3") %>
  queue:
    <<: *default
    database: <%= File.join(db_dir, "scribe_queue.sqlite3") %>
    migrations_paths: db/queue_migrate
  cache:
    <<: *default
    database: <%= File.join(db_dir, "scribe_cache.sqlite3") %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: <%= File.join(db_dir, "scribe_cable.sqlite3") %>
    migrations_paths: db/cable_migrate
